<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>musicaliti</title>

    <!-- ESTILOS DO SEU SITE E DA PLAYLIST -->
    <style>
      body {
        background-color: #121212;
        color: #ffffff;
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      /* Container do Player do YouTube + Playlist */
      .container-youtube {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        background-color: #0f0f0f;
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 30px;
      }

      /* Player Principal */
      #playerYoutube {
        width: 100%;
        max-width: 640px;
        height: 360px;
        border-radius: 8px;
      }

      /* Caixa da Playlist */
      .caixa-playlist {
        background-color: #212121;
        border-radius: 12px;
        padding: 15px;
        width: 100%;
        max-width: 380px;
        max-height: 360px;
        overflow-y: auto;
        box-sizing: border-box;
      }

      .caixa-playlist h3 {
        margin: 0 0 12px 0;
        border-bottom: 1px solid #3d3d3d;
        padding-bottom: 10px;
        font-size: 16px;
      }

      /* Itens da Playlist (Capa + Título) */
      .item-playlist {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 8px;
        background-color: #181818;
        border-radius: 8px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .item-playlist:hover {
        background-color: #383838;
      }

      .item-playlist.ativo {
        background-color: #272727;
        border: 2px solid #ff0000;
      }

      .capa-thumb {
        width: 120px;
        height: 68px;
        object-fit: cover;
        border-radius: 6px;
        flex-shrink: 0;
      }

      .titulo-thumb {
        font-size: 13px;
        color: #f1f1f1;
        font-weight: 500;
        line-height: 1.3;
      }

      /* Seção dos Outros Vídeos */
      .outros-videos {
        margin-top: 30px;
      }

      .outros-videos iframe {
        margin: 10px 5px;
        border-radius: 8px;
      }
    </style>
</head>
<body>

    <h1>meu site de musica cagado</h1>   
    <h3>ousa musicas boas</h3>
    
    <!-- Corrigido o "stile" para "style" -->
    <div style="background-color:#fa8794; height: 10px; border-radius: 4px; margin-bottom: 20px;"></div>

    <!-- ========================================== -->
    <!-- PLAYLIST MADNESS COMBAT                    -->
    <!-- ========================================== -->
    <div class="container-youtube">
      <div id="playerYoutube"></div>

      <div class="caixa-playlist">
        <h3>Playlist Madness Combat</h3>
        <div id="listaPlaylist"></div>
      </div>
    </div>

    <!-- ========================================== -->
    <!-- OUTROS VÍDEOS AVULSOS DO SEU SITE          -->
    <!-- ========================================== -->
    <div class="outros-videos">
      <h2>Mais Vídeos</h2>
      <iframe width="437" height="234" src="https://www.youtube.com/embed/1yccLCss1DY" title="The Battle bosta: Science's Downfall" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

      <iframe width="437" height="234" src="https://www.youtube.com/embed/RpeZtgF6zA4" title="DRAGON BALL SUPER OPENING 2 | VERSIoN CHAVO DEL 8| ARQUIVO COVER" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

      <iframe width="437" height="234" src="https://www.youtube.com/embed/l_cvX32Pjso" title="cuphead purgatory" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

      <iframe width="437" height="234" src="https://www.youtube.com/embed/0mY1LaHYza0" title="EM QUANTOS DIAS UM MILIONaRIO CONSEGUE FUGIR DA PRISaO?" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>

    <!-- ========================================== -->
    <!-- SCRIPT DA PLAYLIST (CORRIGIDO)            -->
    <!-- ========================================== -->
    <script>
      const playlist = [
        { titulo: "Madness Combat 1", id: "H1aubPfepmg" },
        { titulo: "Madness Combat 2: Redeemer", id: "K9F7FKcz80k" },
        { titulo: "Madness Combat 3: Avenger", id: "2cNVaHVP6p8" }
      ];

      let player;
      let indiceAtual = 0;

      // Carrega a API do YouTube
      const tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      const firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      // Função global corrigida (sem duplicata)
      window.onYouTubeIframeAPIReady = function() {
        player = new YT.Player('playerYoutube', {
          videoId: playlist[0].id,
          events: {
            'onStateChange': quandoEstadoMudar
          }
        });
        desenharPlaylist();
      };

      // Gera a lista com capas
      function desenharPlaylist() {
        const container = document.getElementById("listaPlaylist");
        if (!container) return;
        
        container.innerHTML = "";

        playlist.forEach((video, index) => {
          const item = document.createElement("div");
          item.className = "item-playlist" + (index === indiceAtual ? " ativo" : "");

          const urlCapa = `https://img.youtube.com/vi/${video.id}/mqdefault.jpg`;

          item.innerHTML = `
            <img src="${urlCapa}" alt="Capa do vídeo" class="capa-thumb">
            <span class="titulo-thumb">${video.titulo}</span>
          `;

          item.onclick = function() {
            tocarVideo(index);
          };

          container.appendChild(item);
        });
      }

      function tocarVideo(index) {
        indiceAtual = index;
        player.loadVideoById(playlist[indiceAtual].id);
        desenharPlaylist();
      }

      function quandoEstadoMudar(event) {
        if (event.data === YT.PlayerState.ENDED) {
          let proximo = (indiceAtual + 1) % playlist.length;
          tocarVideo(proximo);
        }
      }
    </script>
</body>
</html>
